# quality-tiers.yml
# Source of truth for module rigor tier classification across this repository.
# Every project MUST be listed below with a tier value of t1, t2, t3, or t4.
# Adding a project without a tier classification fails the CI tier-classification stage.
# See .claude/rules/quality-tiers.md for tier definitions.

schema_version: 1

projects:
  # Current TypeScript scaffold (the Office add-in skeleton at the repo root).
  - name: tmw-taskpane-scaffold
    path: .
    language: typescript
    tier: t4
    rationale: |
      Scaffold-tier (T4): build wiring, manifest, and bootstrap only. Will be re-tiered
      when domain modules and classifier engines are introduced (Prompt B1+).

  # .NET foundation projects added by Issue #7 (Prompt C1).
  - name: TaskMaster.Domain
    path: src/TaskMaster.Domain
    language: csharp
    tier: t2
    rationale: |
      Core domain library (T2). Currently an empty placeholder (only AssemblyMarker is
      present); domain types arrive in later prompts. Tier reflects intended role per
      quality-tiers.md (core domain bugs cause feature regression but not data loss).
  - name: TaskMaster.Api
    path: src/TaskMaster.Api
    language: csharp
    tier: t3
    rationale: |
      Web API adapter (T3). Hosts the minimal API surface and NSwag-driven OpenAPI
      emission. T3 tier reflects adapter-glue role around ASP.NET Core; the team does
      not own the ASP.NET Core/OpenAPI surface.
  - name: TaskMaster.ArchitectureTests
    path: tests/TaskMaster.ArchitectureTests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): NetArchTest.Rules facts enforcing No-COM architecture and
      domain/infrastructure layering. Tier reflects test-infrastructure role.
  - name: TaskMaster.Api.Tests
    path: tests/TaskMaster.Api.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): xUnit + Microsoft.AspNetCore.Mvc.Testing unit/integration
      tests for the API host and Domain marker. Tier reflects test-infrastructure role;
      production files under test (Program.cs, HealthResponse.cs, AssemblyMarker.cs)
      are tiered separately under their owning projects.

  # New projects added by Issue #12 (Prompt C2 — Backend API Foundation).
  - name: TaskMaster.Application
    path: src/TaskMaster.Application
    language: csharp
    tier: t2
    rationale: |
      Core application layer (T2). Contains command bus, IUserSettingsRepository contract,
      IGraphClientFactory interface, and DI wiring. Bugs here cause feature regressions.
      Property-based tests required for all pure functions per T2 policy.
  - name: TaskMaster.Infrastructure
    path: src/TaskMaster.Infrastructure
    language: csharp
    tier: t3
    rationale: |
      Infrastructure adapter layer (T3). Contains JsonFileUserSettingsRepository,
      InMemoryUserSettingsRepository, GraphClientFactory, and IFileWriter seam.
      Adapter-glue around file I/O and Microsoft Graph SDK.
  - name: TaskMaster.Application.Tests
    path: tests/TaskMaster.Application.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): xUnit + CsCheck tests for TaskMaster.Application and
      InMemoryUserSettingsRepository. Tier reflects test-infrastructure role.
  - name: TaskMaster.Infrastructure.Tests
    path: tests/TaskMaster.Infrastructure.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): xUnit + WireMock.Net + NSubstitute tests for
      TaskMaster.Infrastructure. Tier reflects test-infrastructure role.

  # New projects added by Issue #17 (implement-classify-selected-message).
  - name: TaskMaster.Classifier
    path: src/TaskMaster.Classifier
    language: csharp
    tier: t1
    rationale: |
      Critical classifier engine (T1). KeywordClassifier implements IMessageClassifier and
      drives the message classification feature. Behavior bugs cause silent misclassification
      (model drift). Requires property-based tests, golden tests against a versioned corpus,
      and Stryker.NET mutation score >= 75% per T1 policy.

  - name: TaskMaster.Classifier.Tests
    path: tests/TaskMaster.Classifier.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): xUnit.v3 + Verify.XunitV3 + CsCheck + FluentAssertions tests for
      TaskMaster.Classifier. Includes unit tests, property-based tests, and golden tests. Tier
      reflects test-infrastructure role; the production code under test (KeywordClassifier) is
      tiered separately as T1 under TaskMaster.Classifier.

  # New project added by Issue #23 (idempotency-and-benchmark-infra / Prompt G1).
  - name: TaskMaster.Benchmarks
    path: tests/TaskMaster.Benchmarks
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): BenchmarkDotNet project exercising classifier hot paths
      (Prompt D2) and a disabled placeholder for the delta-reconciliation hot path
      (Prompt G2). Drives pre-merge stage-10 benchmark regression gate but contains
      no production code under test; tier reflects pure benchmark/test-infrastructure
      role.

  - name: TaskMaster.Worker.Tests
    path: tests/TaskMaster.Worker.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): xunit.v3 + CsCheck + FluentAssertions test project
      hosting the SubscriptionHandlerTestBase, the idempotency property fixture,
      and the delta-reconciliation property tests required by Prompt G1. Inherits
      the idempotency property check on derived handler test classes so the gate
      lands ahead of Prompt G2's handler code. Tier reflects pure test-infrastructure
      role.

  # New project added by Issue #15 (establish-behavior-correctness-test-infra).
  - name: TaskMaster.PlaceholderGolden.Tests
    path: tests/TaskMaster.PlaceholderGolden.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): placeholder golden test project demonstrating
      Verify.XunitV3 infrastructure. Establishes the baseline for golden/snapshot
      testing; no production code under test. Tier reflects pure test-infrastructure role.

  # New projects added by Issue #22 (metadata-schema-evolution-infra).
  - name: TaskMaster.Schema.Tests
    path: tests/TaskMaster.Schema.Tests
    language: csharp
    tier: t4
    rationale: |
      Test scaffolding (T4): xUnit schema-evolution tests for JSON Schema files and
      write-path validation. Tier reflects test-infrastructure role.
  - name: schema-diff
    path: tools/schema-diff
    language: csharp
    tier: t4
    rationale: |
      Scaffolding (T4): CLI tool that wraps JsonSchema.Net to perform breaking-change
      analysis between two schema versions. Used exclusively by the schema-contract CI action.

# Validator behavior (read by .github/workflows/pr-pipeline.yml stage tier-classification):
# - Every entry under projects MUST have name, path, language, tier.
# - tier value MUST be one of: t1, t2, t3, t4.
# - The validation script also confirms that every directory in the repo that contains a
#   package.json, *.csproj, or pyproject.toml is represented by exactly one entry.
