name: Typecheck
description: TypeScript type-check using tsc --noEmit with strict flags.
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
    - name: Install dependencies
      shell: pwsh
      run: npm ci --no-audit --no-fund
    - name: tsc --noEmit
      shell: pwsh
      run: npm run typecheck
