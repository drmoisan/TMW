name: Lint
description: ESLint v9 flat-config with typescript-eslint strict-type-checked.
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
    - name: Install dependencies
      shell: pwsh
      run: npm ci --no-audit --no-fund
    - name: ESLint
      shell: pwsh
      run: npm run lint
