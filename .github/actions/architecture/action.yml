name: Architecture
description: Architecture-boundary tests stage. dependency-cruiser for TypeScript.
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
    - name: Install dependencies
      shell: pwsh
      run: npm ci --no-audit --no-fund
    - name: dependency-cruiser
      shell: pwsh
      run: npx depcruise --config .dependency-cruiser.cjs src
