name: Format
description: Prettier format check using office-addin-prettier-config.
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
    - name: Install dependencies
      shell: pwsh
      run: npm ci --no-audit --no-fund
    - name: Prettier format check
      shell: pwsh
      run: npm run format:check
