name: benchmark-gate-self-validation
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-gate-self-validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Run self-validation suite (LatencyRegressionGateTests passes; NonIdempotentHandlerNegativeTests is expected to fail; both inner outcomes prove the gate fires)
        shell: pwsh
        run: |
          dotnet test tests/TaskMaster.Worker.Tests -c Release --filter "Category=benchmark-gate-self-validation&FullyQualifiedName~LatencyRegressionGateTests" --nologo
          $latencyExit = $LASTEXITCODE
          if ($latencyExit -ne 0) { Write-Error "LatencyRegressionGateTests must pass (it asserts the comparator rejects the synthetic regression)."; exit 1 }

          dotnet test tests/TaskMaster.Worker.Tests -c Release --filter "Category=benchmark-gate-self-validation&FullyQualifiedName~NonIdempotentHandlerNegativeTests" --nologo
          $negExit = $LASTEXITCODE
          if ($negExit -eq 0) { Write-Error "NonIdempotentHandlerNegativeTests must FAIL (proving the inherited idempotency check detects the non-idempotent handler)."; exit 1 }
          Write-Host "benchmark-gate-self-validation: latency gate caught synthetic regression and non-idempotent handler was detected as expected."
          # The preceding dotnet test invocation is expected to exit 1 (negative test). Reset $LASTEXITCODE so the GitHub Actions pwsh step does not inherit it.
          exit 0
