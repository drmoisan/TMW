name: Pre-Merge Pipeline
on:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage-8-mutation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Restore local tools
        shell: pwsh
        run: dotnet tool restore
      - name: Install npm dependencies
        shell: pwsh
        run: npm ci --no-audit --no-fund
      - name: stage-8-mutation-classifier
        shell: pwsh
        run: |
          cd tests/TaskMaster.Classifier.Tests
          dotnet stryker --config-file stryker-config.json

  stage-9-golden:
    runs-on: windows-latest
    needs: [stage-8-mutation]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        shell: pwsh
        run: dotnet restore TaskMaster.sln
      - name: Run placeholder golden tests
        shell: pwsh
        run: |
          dotnet test tests/TaskMaster.PlaceholderGolden.Tests/TaskMaster.PlaceholderGolden.Tests.csproj --no-restore --collect:"XPlat Code Coverage"
      - name: Run classifier golden tests
        shell: pwsh
        run: |
          dotnet test tests/TaskMaster.Classifier.Tests/TaskMaster.Classifier.Tests.csproj --no-restore --collect:"XPlat Code Coverage"

  stage-10-e2e:
    runs-on: ubuntu-latest
    needs: [stage-9-golden]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install npm dependencies
        shell: bash
        run: npm ci --no-audit --no-fund
      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E smoke
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
        run: npx playwright test tests/e2e/

  stage-14-schema-evolution:
    runs-on: windows-latest
    needs: [stage-10-e2e]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore solution
        shell: pwsh
        run: dotnet restore TaskMaster.sln
      - name: Run schema-evolution tests
        shell: pwsh
        run: dotnet test tests/TaskMaster.Schema.Tests/TaskMaster.Schema.Tests.csproj --no-restore --collect:"XPlat Code Coverage"
