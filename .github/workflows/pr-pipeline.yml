name: PR Pipeline
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tier-classification:
    uses: ./.github/workflows/_tier-classification.yml

  stage-1-format:
    needs: [tier-classification]
    uses: ./.github/workflows/_stage-1-format.yml

  stage-2-lint:
    needs: [stage-1-format]
    uses: ./.github/workflows/_stage-2-lint.yml

  stage-3-typecheck:
    needs: [stage-2-lint]
    uses: ./.github/workflows/_stage-3-typecheck.yml

  stage-4-architecture:
    needs: [stage-3-typecheck]
    uses: ./.github/workflows/_stage-4-architecture.yml

  stage-5-test:
    needs: [stage-4-architecture]
    uses: ./.github/workflows/_stage-5-test.yml

  stage-6-contract:
    needs: [stage-5-test]
    uses: ./.github/workflows/_stage-6-contract.yml

  stage-7-integration:
    needs: [stage-6-contract]
    uses: ./.github/workflows/_stage-7-integration.yml

  stage-1-dotnet-format:
    needs: [tier-classification]
    uses: ./.github/workflows/_stage-1-dotnet-format.yml

  stage-2-dotnet-build:
    needs: [stage-1-dotnet-format]
    uses: ./.github/workflows/_stage-2-dotnet-build.yml

  stage-3-dotnet-typecheck:
    needs: [stage-2-dotnet-build]
    uses: ./.github/workflows/_stage-3-dotnet-typecheck.yml

  stage-4-dotnet-architecture:
    needs: [stage-3-dotnet-typecheck]
    uses: ./.github/workflows/_stage-4-dotnet-architecture.yml

  stage-5-dotnet-test:
    needs: [stage-4-dotnet-architecture]
    uses: ./.github/workflows/_stage-5-dotnet-test.yml

  stage-e2e-smoke:
    needs: [stage-7-integration]
    if: contains(github.event.pull_request.labels.*.name, 'e2e:run')
    uses: ./.github/workflows/_stage-e2e-smoke.yml
    secrets: inherit

  stage-10-benchmark-regression:
    needs: [stage-7-integration]
    uses: ./.github/workflows/_stage-10-benchmark-regression.yml

  benchmark-gate-self-validation:
    needs: [stage-7-integration]
    uses: ./.github/workflows/_benchmark-gate-self-validation.yml

  secret-scan:
    uses: ./.github/workflows/_secret-scan.yml
