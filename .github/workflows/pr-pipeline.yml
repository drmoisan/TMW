name: PR Pipeline
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tier-classification:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: pwsh -NoProfile -File .github/scripts/validate-quality-tiers.ps1
  stage-1-format:
    runs-on: windows-latest
    needs: [tier-classification]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/format
  stage-2-lint:
    runs-on: windows-latest
    needs: [stage-1-format]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint
  stage-3-typecheck:
    runs-on: windows-latest
    needs: [stage-2-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/typecheck
  stage-4-architecture:
    runs-on: windows-latest
    needs: [stage-3-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/architecture
  stage-5-test:
    runs-on: windows-latest
    needs: [stage-4-architecture]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test
  stage-6-contract:
    runs-on: windows-latest
    needs: [stage-5-test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/contract
  stage-7-integration:
    runs-on: windows-latest
    needs: [stage-6-contract]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/integration
  stage-1-dotnet-format:
    runs-on: windows-latest
    needs: [tier-classification]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-format
  stage-2-dotnet-build:
    runs-on: windows-latest
    needs: [stage-1-dotnet-format]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-build
  stage-3-dotnet-typecheck:
    runs-on: windows-latest
    needs: [stage-2-dotnet-build]
    steps:
      - uses: actions/checkout@v4
      - name: Nullable analysis runs inside dotnet build
        shell: pwsh
        run: |
          Write-Host "Nullable analysis is enforced via Directory.Build.props (<Nullable>enable</Nullable> + <TreatWarningsAsErrors>true</TreatWarningsAsErrors>); the build in stage-2-dotnet-build fails on any nullable warning. No separate typecheck command is required."
  stage-4-dotnet-architecture:
    runs-on: windows-latest
    needs: [stage-3-dotnet-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-architecture
  stage-5-dotnet-test:
    runs-on: windows-latest
    needs: [stage-4-dotnet-architecture]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dotnet-test
  secret-scan:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        shell: pwsh
        run: |
          $bin = & .github/scripts/install-gitleaks.ps1
          "GITLEAKS_BIN=$bin" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Scan PR diff
        shell: pwsh
        run: |
          & $env:GITLEAKS_BIN detect --no-banner --redact --config=.gitleaks.toml --log-opts="origin/${{ github.base_ref }}..HEAD"
