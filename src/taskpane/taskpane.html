<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskMaster</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-font-m ms-Fabric">
    <header class="tm-header ms-bgColor-neutralLighter">
        <img width="90" height="90" src="../../assets/logo-filled.png" alt="TaskMaster" title="TaskMaster" />
        <h1 class="ms-font-su">TaskMaster</h1>
    </header>
    <section id="sideload-msg" class="tm-main">
        <h2 class="ms-font-xl">Please <a target="_blank" href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing">sideload</a> your add-in to see app body.</h2>
    </section>
    <main id="app-body" class="tm-main" style="display: none;">
        <h2 class="ms-font-xl">Selected message</h2>
        <p id="status" class="ms-font-m">No message selected.</p>
        <p class="ms-font-m"><strong>Subject:</strong> <span id="selected-subject"></span></p>
        <p class="ms-font-m"><strong>From:</strong> <span id="selected-from"></span></p>
        <div id="classification-panel" class="ms-font-m">
            <p><strong>Classification:</strong> <span id="classification-result"></span></p>
            <button id="classify-btn" type="button" class="ms-Button ms-Button--primary">Classify</button>
            <button id="confirm-btn" type="button" class="ms-Button" disabled>Confirm</button>
            <button id="reject-btn" type="button" class="ms-Button" disabled>Reject</button>
        </div>
    </main>
</body>

</html>
